    <rect x="2" y="2" width="20" height="20" rx="3"/>
    <rect x="2" y="2" width="20" height="5" rx="3" fill="currentColor" opacity="0.12" stroke="none"/>
    <circle cx="5"  cy="4.5" r="0.8" fill="currentColor"/>
    <circle cx="7.5" cy="4.5" r="0.8" fill="currentColor"/>
    <circle cx="12" cy="13" r="5"/>
    <circle cx="12" cy="13" r="3"/>
    <path d="M10 11.5 L11.5 13 L14.5 10.5" stroke-width="1.5"/>
  </symbol>

  <!-- ── Drag & drop ────────────────────────────────── -->

  <symbol id="icon-file-drop" viewBox="0 0 24 24" fill="none"
