<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3498db"/>
      <stop offset="100%" stop-color="#1a6da0"/>
    </linearGradient>
    <linearGradient id="drum" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1d6a96"/>
      <stop offset="100%" stop-color="#154e73"/>
    </linearGradient>
    <radialGradient id="glass" cx="38%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#2980b9" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0d3a56" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="1" stdDeviation="1.5" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- App icon background (rounded square) -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Top control strip -->
  <rect x="8" y="8" width="48" height="9" rx="3" fill="rgba(0,0,0,0.18)"/>

  <!-- Indicator LEDs -->
  <circle cx="13.5" cy="12.5" r="2.2" fill="#74c9ee"/>
  <circle cx="13.5" cy="12.5" r="1.2" fill="#b8e8f8"/>
  <circle cx="20"   cy="12.5" r="2.2" fill="#f39c12" opacity="0.85"/>
  <circle cx="20"   cy="12.5" r="1.1" fill="#fce8b2"/>

  <!-- Separator line -->
  <rect x="8" y="17" width="48" height="1.5" rx="0.75" fill="rgba(0,0,0,0.15)"/>

  <!-- Porthole outer bezel -->
  <circle cx="32" cy="39" r="20" fill="rgba(0,0,0,0.2)" filter="url(#shadow)"/>

  <!-- Drum ring -->
  <circle cx="32" cy="39" r="19" fill="url(#drum)"/>
  <circle cx="32" cy="39" r="19" fill="none" stroke="#5dade2" stroke-width="1.2" opacity="0.6"/>

  <!-- Inner drum bolts (4 small circles at cardinal points) -->
  <circle cx="32" cy="21.5" r="1.4" fill="#5dade2" opacity="0.7"/>
  <circle cx="32" cy="56.5" r="1.4" fill="#5dade2" opacity="0.7"/>
  <circle cx="13.5" cy="39" r="1.4" fill="#5dade2" opacity="0.7"/>
  <circle cx="50.5" cy="39" r="1.4" fill="#5dade2" opacity="0.7"/>

  <!-- Drum glass inner -->
  <circle cx="32" cy="39" r="13.5" fill="#0d3a56"/>
  <circle cx="32" cy="39" r="13.5" fill="url(#glass)"/>

  <!-- Shield shape inside drum -->
  <path d="M32 27 L41.5 31.2 L41.5 38.5 C41.5 44.8 37.2 49.8 32 51.5 C26.8 49.8 22.5 44.8 22.5 38.5 L22.5 31.2 Z"
        fill="#2980b9" opacity="0.9"/>
  <path d="M32 28.5 L40 32.2 L40 38.5 C40 43.8 36.5 48.2 32 49.8 C27.5 48.2 24 43.8 24 38.5 L24 32.2 Z"
        fill="#3498db"/>

  <!-- Checkmark -->
  <polyline points="26.5,39 30.5,43.5 38.5,33"
            fill="none"
            stroke="white"
            stroke-width="3"
            stroke-linecap="round"
            stroke-linejoin="round"/>

  <!-- Shine reflection on porthole glass -->
  <ellipse cx="26" cy="29" rx="5" ry="3" fill="white" opacity="0.08" transform="rotate(-30,26,29)"/>
</svg>
